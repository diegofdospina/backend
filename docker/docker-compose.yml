version: '3.8'

services:
  db:
    container_name: backend-db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: backend_db_user
      POSTGRES_PASSWORD: backend_db_password
      PGDATA: /data/db
      POSTGRES_DB: backend_db
    ports:
      - '50001:5432'
    volumes:
      - db:/data/db

volumes:
  db:
    driver:
      local